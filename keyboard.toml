# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "pkkblab"
product_name = "pkkblab"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "rmk"
chip = "nrf52840"

[layout]
rows = 4
cols = 10
layers = 8
keymap = [
    [
        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"], 
        ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Enter"], 
        ["Z", "X", "C", "V", "B", "N", "M", "E", "R", "T"], 
        ["LCtrl", "LGui", "LAlt", "LShift", "LT(1, Space)", "Q", "W", "E", "R", "T"]
    ],
    # Layer 1 Func (Left half only)
    [
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"]
    ],
    [
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"]
    ],
      [
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_" , "_", "_", "_", "_", "_"]
    ],
]

[rmk]
# Maximum number of combos keyboard can store
combo_max_num = 15
# Maximum number of keys pressed simultaneously in a combo
combo_max_length = 4
# Default debounce time in milliseconds  
debounce_time = 5

[split]
connection = "ble"

[ble]
enabled = true
battery_adc_pin = "vddh"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]
[split.central.matrix]
matrix_type = "normal"
col_pins = ["P0_21", "P0_15", "P0_14", "P0_16", "P0_10"]
row_pins = ["P0_09", "P0_24", "P0_23", "P0_22"]
# row2col = true

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]
[split.peripheral.matrix]
matrix_type = "normal"
col_pins = ["P0_21", "P0_15", "P0_14", "P0_16", "P0_10"]
row_pins = ["P0_09", "P0_24", "P0_23", "P0_22"]
# row2col = true
