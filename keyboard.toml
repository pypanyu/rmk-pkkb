 #Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "pkkblab"
product_name = "pkkblab"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "rmk"
chip = "nrf52840"

[layout]
rows = 4
cols = 10
layers = 8
keymap = [
    # Layer 0
    [
        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
        ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Enter"],
        ["Z", "X", "C", "V", "B", "N", "M", "E", "R", "T"],
        ["LCtrl", "1", "LAlt", "LShift", "Space", "LT(2, Space)", "RAlt", "E", "R", "T"]
    ],
    # Layer 1 (Left half only)
    [
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"]
    ],
    # Layer 2
    [
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"]
    ],
    # Layer 3
    [
        ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"]
    ],
    # Layer 4 (empty/transparent)
    [
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"]
    ],
    # Layer 5
    [
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"]
    ],
    # Layer 6
    [
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"]
    ],
    # Layer 7
    [
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"]
    ]
]

[rmk]
# Maximum number of combos keyboard can store
combo_max_num = 25
# Maximum number of keys pressed simultaneously in a combo
combo_max_length = 4
# Default debounce time in milliseconds  
debounce_time = 5

[ble]
enabled = true
battery_adc_pin = "vddh"

[split]
connection = "ble"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]
[split.central.matrix]
matrix_type = "normal"
col_pins = ["P1_15", "P1_13", "P1_11", "P0_10", "P0_09"]
row_pins = ["P1_06", "P0_02", "P0_29", "P0_31"]
# col2row = true

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]
[split.peripheral.matrix]
matrix_type = "normal"
col_pins = ["P1_15", "P1_13", "P1_11", "P0_10", "P0_09"]
row_pins = ["P1_06", "P0_02", "P0_29", "P0_31"]
# col2row = true
